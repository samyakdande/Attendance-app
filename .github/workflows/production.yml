name: Production Pipeline

on:
  push:
    branches:
      - main

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci
        working-directory: ./backend

      - name: Run ESLint
        run: npm run lint
        working-directory: ./backend

      - name: Type Check (TypeScript)
        run: npx tsc --noEmit
        working-directory: ./backend

      - name: Run Unit Tests
        run: npm run test
        working-directory: ./backend

  build:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci
        working-directory: ./backend

      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: ./backend

      - name: Build NestJS App
        run: npm run build
        working-directory: ./backend

  deploy-staging:
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Deploy to Staging (Example: Google App Engine)
        run: echo "Deploying to Staging Environment..."
        # Add actual deployment script here, e.g. gcloud app deploy --project=campusflow-staging

  smoke-test:
    needs: deploy-staging
    runs-on: ubuntu-latest
    steps:
      - name: Run API Smoke Tests
        run: |
          echo "Hitting Staging API /health..."
          # curl -f https://staging-api.campusflow.com/health || exit 1

  deploy-production:
    needs: smoke-test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy Backend to Production
        run: echo "Deploying to Production App Engine..."
        
      - name: Deploy Mobile OTA Update
        run: |
          echo "Triggering EAS Update for production channel..."
